{% extends "masterss.html" %}
{% block body_class %}no-navbar{% endblock %}
{% block title %}Thank You{% endblock %}

{% block content %}

<style>
body {
    background-color: #F4EFE8;
}

.thank-wrapper {
    min-height: 100vh;
}

.thank-card {
    background: linear-gradient(180deg, #FFF8EE, #F3E8D9);
    border-radius: 26px;
    padding: 32px;
}

.thank-title {
    color: #4B3326;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.btn-home {
    background-color: #6A4632;
    color: #FFF8E7;
    font-weight: 600;
    letter-spacing: 0.4px;
    padding: 10px;
    transition: all 0.3s ease;
}

.btn-home:hover {
    background-color: #CFAF5D;
    color: #3E2A20;
}

p {
    color: #4A3A32;
    font-size: 1rem;
}
</style>

<div class="container thank-wrapper d-flex align-items-center justify-content-center">
    <div class="col-md-5 col-lg-4">

        <div class="card thank-card shadow-lg border-0">
            <div class="card-body text-center">

                <h4 class="thank-title mb-3">Thank You!</h4>

                <p>Your message has been successfully sent.</p>
                <p>We’ll get back to you soon.</p>

                <a href="/" class="btn btn-home rounded-pill w-100 mt-3">Return to Home</a>

            </div>
        </div>

    </div>
</div>

{% endblock %}
