<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #F8F5F2;
            color: #4A3A32;
            margin: 0;
            height: 100vh;

            /* Center the box */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #6A4632;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Thank You!</h2>
        <p>Your message has been successfully sent.</p>
        <p>We’ll get back to you soon.</p>

        <a href="/" style="color:#6A4632; text-decoration:underline;">Return to Home</a>
    </div>
</body>
</html>
