{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/admin_base.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    {% block extra_css %}{% endblock %}
</head>
<body class="admin-dashboard">

<!-- TOPBAR -->
<div class="topbar">
    <div class="d-flex align-items-center gap-3">
        <i class="fas fa-bars menu-toggle" id="menuToggle"></i>
        <div class="logo">Paletra</div>
    </div>
    <div class="topbar-right">
        <div class="notif-wrapper">
    <i class="fas fa-bell" id="notifToggle"></i>
    <span id="notifCount" class="notif-badge" style="display:none;"></span>

    <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-header">Notifications</div>
        <div id="notifList">
            <p class="empty">No notifications</p>
        </div>
    </div>
</div>
        <div>{{ request.user.username }}</div>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="{% url 'admin_dashboard' %}" 
       class="{% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <i class="fas fa-home"></i> Dashboard
    </a>

    <a href="{% url 'admin_artists' %}" 
       class="{% if request.resolver_match.url_name == 'admin_artists' %}active{% endif %}">
        <i class="fas fa-palette"></i> Artists
    </a>

    <a href="{% url 'admin_clients' %}" 
       class="{% if request.resolver_match.url_name == 'admin_clients' %}active{% endif %}">
        <i class="fas fa-users"></i> Clients
    </a>

    <a href="{% url 'admin_commissions' %}" 
       class="{% if request.resolver_match.url_name == 'admin_commissions' %}active{% endif %}">
        <i class="fas fa-briefcase"></i> Commissions
    </a>

    <a href="{% url 'admin_transactions' %}" 
       class="{% if request.resolver_match.url_name == 'admin_transactions' %}active{% endif %}">
        <i class="fas fa-money-bill-wave"></i> Transactions
    </a>

    <a href="{% url 'logout' %}">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    {% block admin_content %}{% endblock %}
</div>

<!-- JS -->
<script>
const toggleBtn = document.getElementById("menuToggle");
const sidebar = document.getElementById("sidebar");
const mainContent = document.querySelector(".main-content");

toggleBtn.addEventListener("click", () => {
    sidebar.classList.toggle("active");
    if (window.innerWidth > 991) {
        mainContent.style.marginLeft = sidebar.classList.contains("active") ? "0" : "240px";
    }
});

window.addEventListener("resize", () => {
    if (window.innerWidth > 991) {
        mainContent.style.marginLeft = sidebar.classList.contains("active") ? "0" : "240px";
    } else {
        mainContent.style.marginLeft = "0";
    }
});

document.addEventListener('click', function(e){
    if (window.innerWidth <= 768){
        if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
            sidebar.classList.remove('active');
        }
    }
});
</script>

<script>
const toggle = document.getElementById("notifToggle");
const dropdown = document.getElementById("notifDropdown");
const list = document.getElementById("notifList");
const badge = document.getElementById("notifCount");

// toggle dropdown
toggle.addEventListener("click", (e) => {
    e.stopPropagation();

    dropdown.style.display =
        dropdown.style.display === "block" ? "none" : "block";

    if (dropdown.style.display === "block") {
        loadNotifications();
        markAsRead();
    }
});

// close when clicking outside
document.addEventListener("click", () => {
    dropdown.style.display = "none";
});

// prevent closing when clicking inside
dropdown.addEventListener("click", (e) => {
    e.stopPropagation();
});

// fetch notifications
function loadNotifications() {
    fetch("{% url 'get_notifications' %}")
        .then(res => res.json())
        .then(data => {

            if (data.notifications.length === 0) {
                list.innerHTML = "<p class='empty'>No notifications</p>";
                return;
            }

            let html = "";

            data.notifications.forEach(n => {
                html += `
                    <div class="notif-item ${n.is_read ? '' : 'unread'}">
                        ${n.message}
                    </div>
                `;
            });

            list.innerHTML = html;
        });
}

// unread count
function fetchUnreadCount() {
    fetch("{% url 'unread_notification_count' %}")
        .then(res => res.json())
        .then(data => {
            if (data.count > 0) {
                badge.style.display = "inline-block";
                badge.textContent = data.count;
            } else {
                badge.style.display = "none";
            }
        });
}

// CSRF
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}

// mark read
function markAsRead() {
    fetch("{% url 'mark_notification_read' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRFToken()
        }
    }).then(fetchUnreadCount);
}

// auto refresh
fetchUnreadCount();
setInterval(fetchUnreadCount, 5000);
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
